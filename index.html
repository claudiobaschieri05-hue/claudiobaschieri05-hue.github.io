<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claudio Baschieri — Portfolio</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;800&display=swap" rel="stylesheet" />
</head>
<body>

  <canvas id="bg-canvas"></canvas>
  <div class="cursor" id="cursor"></div>
  <div class="cursor-trail" id="cursor-trail"></div>

  <nav id="navbar">
    <div class="nav-logo"><span class="bracket">&lt;</span>Claudio<span class="bracket">/&gt;</span></div>
    <ul class="nav-links">
      <li><a href="#home">home</a></li>
      <li><a href="#about">about</a></li>
      <li><a href="#skills">skills</a></li>
      <li><a href="#projects">projects</a></li>
      <li><a href="#contact">contact</a></li>
    </ul>
    <div class="nav-status"><span class="dot"></span>available for work</div>
  </nav>

  <section id="home" class="hero">
    <div class="hero-content">
      <div class="hero-tag">// mechatronics & automation</div>
      <h1 class="hero-title">
        <span class="line">CLAUDIO</span>
        <span class="line accent">BASCHIERI</span>
      </h1>
      <p class="hero-sub">Costruisco sistemi digitali e industriali ad alta precisione.</p>
      <div class="hero-cta">
        <a href="#projects" class="btn-primary">view projects <span>→</span></a>
      </div>
      <div class="hero-stats">
        <div class="stat"><span class="num" data-target="3">0</span><span class="unit">+</span><div class="label">exp.</div></div>
        <div class="divider-v"></div>
        <div class="stat"><span class="num" data-target="20">0</span><span class="unit">+</span><div class="label">progetti</div></div>
      </div>
    </div>
    <div class="hero-visual">
      <div class="code-window">
        <div class="window-bar">
          <span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span>
          <span class="filename">main.ts</span>
        </div>
        <pre class="code-content" id="typed-code"></pre>
      </div>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
